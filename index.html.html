function validate(){let errs=[];['empresa','responsavel','prefixo','placa','km'].forEach(id=>{if(!state.dados[id])errs.push(fields.find(x=>x[0]===id)[1])});DATA[state.tipo].forEach((sec,si)=>sec[1].forEach((it,qi)=>{let id=`s${si}q${qi}`,a=state.answers[id]||{};if(it.type==='choice'&&!a.value)errs.push(it.text);if((a.value==='NÃO'||a.value==='N/A')&&!(a.obs||'').trim())errs.push(it.text+' — informe observação');}));return errs}
function saveDraft(){try{localStorage.setItem('checklistVTR',JSON.stringify(state));showMsg('Rascunho salvo neste aparelho.','ok')}catch(e){showMsg('Não foi possível salvar. Fotos podem ter excedido o limite do navegador.','err')}}
function loadDraft(){try{let s=JSON.parse(localStorage.getItem('checklistVTR'));if(!s)return;document.getElementById('tipo').value=s.tipo;render(s.tipo);state=s;fields.forEach(([id])=>{let el=document.getElementById('d_'+id);if(el)el.value=s.dados[id]||''});Object.entries(s.answers||{}).forEach(([id,a])=>{let q=document.querySelector(`[data-id="${id}"]`);if(!q)return;if(a.value){let b=q.querySelector(`[data-v="${a.value}"]`);if(b)b.click();let inp=q.querySelector('input:not([type=file]),textarea');if(inp&&q.querySelectorAll('textarea').length===0)inp.value=a.value};let ta=q.querySelector('textarea');if(ta&&a.obs!==undefined)ta.value=a.obs;if(ta&&a.obs===undefined&&a.value&&q.querySelectorAll('.choice').length===0)ta.value=a.value;showPhotos(id)});updateProgress()}catch(e){}}
function showMsg(t,c){let m=document.getElementById('msg');m.textContent=t;m.className='msg '+c;m.style.display='block';setTimeout(()=>m.style.display='none',5000)}
function generatePDF(){let e=validate();if(e.length){showMsg('Pendências: '+e.slice(0,8).join(' • ')+(e.length>8?' • ...':''),'err');return};document.title=`CHECKLIST_VTR_${state.tipo}_${state.dados.prefixo||'VTR'}_${state.dados.data||''}`;window.print();}
function shareWhats(){let nao=Object.values(state.answers).filter(a=>a.value==='NÃO').length,na=Object.values(state.answers).filter(a=>a.value==='N/A').length;let t=`*CHECK LIST VTR ${state.tipo}*%0AData: ${state.dados.data||''} ${state.dados.hora||''}%0APrefixo: ${state.dados.prefixo||''}%0APlaca: ${state.dados.placa||''}%0AEquipe: ${state.dados.equipe||''}%0ANão conformidades: ${nao}%0AItens N/A: ${na}`;window.open('https://wa.me/?text='+t,'_blank')}
function clearForm(){if(confirm('Deseja apagar o preenchimento atual?')){localStorage.removeItem('checklistVTR');location.reload()}}
document.getElementById('tipo').addEventListener('change',e=>render(e.target.value));window.addEventListener('load',loadDraft);
</script></body></html>
